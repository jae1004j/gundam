function renderFilterPanel(container) {
  if (!container) return;

  const render = () => {
    const state = store.state;
    const seriesList = store.getSupportedSeries();
    const seriesCounts = state.seriesCounts;
    const typeCounts   = state.typeCounts;

    container.innerHTML = `
      <div class="filter-sidebar" id="filter-sidebar">
        <div class="filter-sidebar-header">
          <span class="filter-sidebar-title">FILTERS</span>
          <button class="filter-reset-btn" id="filter-reset">초기화</button>
        </div>

        <!-- 기체 타입 필터 -->
        <div class="filter-section">
          <div class="filter-section-title">기체 타입</div>
          <div class="filter-type-btns">
            ${[TYPE.GUNDAM, TYPE.MS, TYPE.MA].map(type => {
              const isActive  = state.types.includes(type);
              const dotColors = { [TYPE.GUNDAM]: 'var(--type-gundam)', [TYPE.MS]: 'var(--type-ms)', [TYPE.MA]: 'var(--type-ma)' };
              const count = (typeCounts[type] || 0);
              return `
                <button class="filter-type-btn ${isActive ? 'active' : ''}" data-type="${type}">
                  <div class="filter-type-dot" style="background:${dotColors[type]}"></div>
                  ${TYPE_KO[type]}
                  <span class="filter-type-btn-count">${count}</span>
                </button>
              `;
            }).join('')}
          </div>
        </div>

        <!-- 작품 필터 -->
        <div class="filter-section">
          <div class="filter-section-title">작품 선택</div>
          <div class="filter-series-list">
            ${seriesList.map(s => {
              const checked = state.seriesIds.includes(s.id);
              const cnt     = seriesCounts.get(s.id) || 0;
              if (cnt === 0) return ''; // 기체 없는 작품 숨김
              return `
                <label class="filter-series-item">
                  <input
                    type="checkbox"
                    class="filter-series-check"
                    data-series-id="${s.id}"
                    ${checked ? 'checked' : ''}
                  />
                  <span class="filter-series-label">${s.ko}</span>
                  <span class="filter-series-count">${cnt}</span>
                </label>
              `;
            }).join('')}
          </div>
        </div>
      </div>

      <!-- 모바일 토글 버튼 -->
      <button class="filter-toggle-btn" id="filter-mobile-toggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="4" y1="6" x2="20" y2="6"/>
          <line x1="4" y1="12" x2="20" y2="12"/>
          <line x1="4" y1="18" x2="20" y2="18"/>
        </svg>
        필터
        ${(state.seriesIds.length + state.types.length) > 0
          ? `<span class="header-count-badge">${state.seriesIds.length + state.types.length}</span>`
          : ''
        }
      </button>
    `;

    _bindEvents(container);
  };

  render();
  store.subscribe(() => render());
}

function _bindEvents(container) {
  // 초기화 버튼
  container.querySelector('#filter-reset')?.addEventListener('click', () => {
    store.resetFilters();
    document.getElementById('header-search')?.value === undefined || (document.getElementById('header-search').value = '');
  });

  // 타입 필터 버튼
  container.querySelectorAll('[data-type]').forEach(btn => {
    btn.addEventListener('click', () => store.toggleType(btn.dataset.type));
  });

  // 시리즈 체크박스
  container.querySelectorAll('[data-series-id]').forEach(checkbox => {
    checkbox.addEventListener('change', () => store.toggleSeries(checkbox.dataset.seriesId));
  });

  // 모바일 토글
  container.querySelector('#filter-mobile-toggle')?.addEventListener('click', () => {
    const sidebar = document.getElementById('filter-sidebar');
    sidebar?.classList.toggle('mobile-open');
  });
}


// ActiveFilters
/**
 * ActiveFilters.js — 현재 적용 중인 필터 태그 컴포넌트
 */



const seriesMap = Object.fromEntries(SUPPORTED_SERIES.map(s => [s.id, s.ko]));

function renderActiveFilters(container) {
  if (!container) return;

  const render = (state) => {
    const tags = [];

    if (state.query) {
      tags.push({ label: `검색: "${state.query}"`, remove: () => store.setQuery('') });
    }
    state.types.forEach(type => {
      tags.push({ label: TYPE_KO[type] || type, remove: () => store.toggleType(type) });
    });
    state.seriesIds.forEach(id => {
      tags.push({ label: seriesMap[id] || id, remove: () => store.toggleSeries(id) });
    });

    if (tags.length === 0) { container.innerHTML = ''; return; }

    container.innerHTML = tags.map((tag, i) => `
      <span class="active-filter-tag">
        ${tag.label}
        <button data-tag-index="${i}" aria-label="${tag.label} 필터 제거">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </span>
    `).join('');

    container.querySelectorAll('[data-tag-index]').forEach(btn => {
      const idx = parseInt(btn.dataset.tagIndex, 10);
      btn.addEventListener('click', () => tags[idx]?.remove());
    });
  };

  render(store.state);
  store.subscribe(state => render(state));
}

const MODAL_PLACEHOLDER_SVG = `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <polygon points="50,6 94,82 6,82" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.3"/>
  <polygon points="50,18 82,80 18,80" fill="rgba(59,130,246,0.06)" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>
  <circle cx="50" cy="60" r="10" fill="#3b82f6" opacity="0.2"/>
</svg>`;

let _currentUnit = null;

function initModal() {
  const overlay = document.getElementById('modal-overlay');
  if (!overlay) return;

  // 오버레이 클릭 → 닫기
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeModal();
  });

  // ESC 닫기
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && overlay.style.display !== 'none') closeModal();
  });

  // 스토어 구독
  store.subscribe(state => {
    if (state.selectedUnit && state.selectedUnit !== _currentUnit) {
      _currentUnit = state.selectedUnit;
      openModal(state.selectedUnit);
    } else if (!state.selectedUnit && overlay.style.display !== 'none') {
      closeModal();
    }
  });
}

function openModal(unit) {
  const overlay = document.getElementById('modal-overlay');
  if (!overlay) return;

  document.body.style.overflow = 'hidden';
  overlay.style.display = 'block';
  overlay.innerHTML = renderModalHtml(unit);

  _bindModalEvents(unit);
  // 스크롤 맨 위로
  overlay.scrollTop = 0;
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  if (!overlay) return;
  overlay.style.display = 'none';
  overlay.innerHTML = '';
  document.body.style.overflow = '';
  _currentUnit = null;
  store.selectUnit(null);
}

              : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="16" height="16" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg> 즐겨찾기 추가`

function _bindModalEvents(unit) {
  // 닫기 버튼
  document.getElementById('modal-close-btn')?.addEventListener('click', closeModal);

  // 탭 전환
  document.querySelectorAll('.modal-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.modal-tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      const tabId = `tab-${tab.dataset.tab}`;
      document.getElementById(tabId)?.classList.add('active');

      // 관련 기체 탭 → 동적 로드
      if (tab.dataset.tab === 'related') _renderRelatedUnits(unit);
    });
  });

  // 영어 원문 토글
  document.getElementById('toggle-en-desc')?.addEventListener('click', () => {
    const descEl = document.getElementById('en-desc-text');
    if (!descEl) return;
    const isVisible = descEl.style.display !== 'none';
    descEl.style.display = isVisible ? 'none' : 'block';
    const btn = document.getElementById('toggle-en-desc');
    if (btn) btn.innerHTML = isVisible
      ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg> 영어 원문 보기`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg> 영어 원문 숨기기`;
  });

  // 즐겨찾기 버튼
  document.getElementById('modal-fav-btn')?.addEventListener('click', (e) => {
    store.toggleFavorite(unit.id);
    // 버튼 아이콘 갱신
    const updated = store.state.allUnits.find(u => u.id === unit.id);
    if (updated) {
      e.currentTarget.innerHTML = updated.isFavorite
        ? `<svg viewBox="0 0 24 24" fill="#f59e0b" stroke="#f59e0b" width="16" height="16" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg> 즐겨찾기 해제`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="16" height="16" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg> 즐겨찾기 추가`;
    }
  });
}

function _renderRelatedUnits(unit) {
  const grid = document.getElementById('related-units-grid');
  if (!grid) return;

  // 같은 시리즈에서 5개 추천 (자기 자신 제외)
  const related = store.state.allUnits
    .filter(u => u.series_id === unit.series_id && u.id !== unit.id)
    .slice(0, 6);

  if (related.length === 0) {
    grid.innerHTML = `<p style="color:var(--text-muted);font-size:0.9rem;grid-column:1/-1;">관련 기체 정보가 없습니다.</p>`;
    return;
  }

  grid.innerHTML = related.map((u, i) => createMechCard(u, i)).join('');
  bindCardGridEvents(grid);
}

function _bindHomeEvents(container) {

    store.selectUnit(random);
  });

  // 빠른 타입 필터
  container.querySelectorAll('.type-filter-quick').forEach(btn => {

}


// MechListPage
/**
 * MechListPage.js — 기체 목록 페이지
 */





const LIST_PAGE_SIZE = 40; // 한 번에 렌더링할 카드 수
let _page = 1;
let _unsubscribe = null;

function renderMechListPage(container) {
  if (!container) return;

  // 기존 구독 해제
  if (_unsubscribe) { _unsubscribe(); _unsubscribe = null; }
  _page = 1;

  container.innerHTML = `
    <div class="mech-list-page">
      <!-- 필터 사이드바 영역 -->
      <div id="filter-panel-wrap"></div>

      <!-- 목록 영역 -->
      <div class="mech-list-main">
        <!-- 활성 필터 태그 -->
        <div id="active-filters-wrap" class="active-filters"></div>

        <!-- 툴바 -->
        <div class="mech-list-toolbar">
          <span class="mech-list-info" id="result-info">
            ${store.state.isLoading
              ? '로딩 중...'
              : `총 <strong>${store.state.filteredUnits.length.toLocaleString()}</strong>개 기체`
            }
          </span>
          <select class="sort-select" id="sort-select" aria-label="정렬 기준">
            <option value="series" ${store.state.sortBy === 'series' ? 'selected' : ''}>작품명 순</option>
            <option value="name_ko" ${store.state.sortBy === 'name_ko' ? 'selected' : ''}>기체명 가나다순</option>
            <option value="name_en" ${store.state.sortBy === 'name_en' ? 'selected' : ''}>기체명 알파벳순</option>
          </select>
        </div>

        <!-- 카드 그리드 -->
        <div class="mech-grid" id="mech-grid">
          ${store.state.isLoading
            ? createSkeletonCards(20)
            : ''
          }
        </div>

        <!-- 더 보기 버튼 -->
        <div id="load-more-wrap" style="text-align:center;margin-top:var(--spacing-2xl);"></div>
      </div>
    </div>
  `;

  // 필터 패널 렌더
  renderFilterPanel(document.getElementById('filter-panel-wrap'));

  // 활성 필터 태그
  renderActiveFilters(document.getElementById('active-filters-wrap'));

  // 정렬 드롭다운
  document.getElementById('sort-select')?.addEventListener('change', e => {
    store.setSortBy(e.target.value);
    _page = 1;
  });

  // 초기 렌더
  if (!store.state.isLoading) {
    _renderCards();
  }

  // 스토어 구독 (필터/데이터 변경 시 재렌더)
  _unsubscribe = store.subscribe(state => {
    _updateResultInfo(state);
    if (!state.isLoading) {
      _page = 1;
      _renderCards();
    } else {
      const grid = document.getElementById('mech-grid');
      if (grid) grid.innerHTML = createSkeletonCards(20);
    }
  });
}

function _renderCards() {
  const grid = document.getElementById('mech-grid');
  if (!grid) return;

  const units = store.state.filteredUnits;
  const slice = units.slice(0, _page * LIST_PAGE_SIZE);

  if (units.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">
          <svg viewBox="0 0 100 100" fill="none">
            <polygon points="50,8 92,78 8,78" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.3"/>
            <circle cx="50" cy="60" r="8" fill="#3b82f6" opacity="0.2"/>
            <line x1="50" y1="8" x2="50" y2="52" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
          </svg>
        </div>
        <h3>기체를 찾을 수 없습니다</h3>
        <p>다른 검색어나 필터를 사용해보세요.</p>
      </div>
    `;
    document.getElementById('load-more-wrap').innerHTML = '';
    return;
  }

  grid.innerHTML = slice.map((unit, i) => createMechCard(unit, i)).join('');
  bindCardGridEvents(grid);

  // 더 보기 버튼
  const loadWrap = document.getElementById('load-more-wrap');
  if (loadWrap) {
    if (slice.length < units.length) {
      loadWrap.innerHTML = `
        <button class="btn btn-secondary" id="load-more-btn" style="min-width:200px;">
          더 보기 (${slice.length} / ${units.length})
        </button>
      `;
      document.getElementById('load-more-btn')?.addEventListener('click', () => {
        _page++;
        _renderCards();
      });
    } else {
      loadWrap.innerHTML = `
        <p style="color:var(--text-muted);font-size:0.85rem;padding:var(--spacing-md);">
          — 전체 ${units.length}개 기체를 모두 표시했습니다 —
        </p>
      `;
    }
  }
}

function _updateResultInfo(state) {
  const el = document.getElementById('result-info');
  if (!el) return;
  if (state.isLoading) {
    el.innerHTML = '로딩 중...';
  } else {
    const filtered = state.filteredUnits.length;
    const total    = state.allUnits.length;
    el.innerHTML = filtered === total
      ? `총 <strong>${total.toLocaleString()}</strong>개 기체`
      : `<strong>${filtered.toLocaleString()}</strong>개 기체 (전체 ${total.toLocaleString()}개 중)`;
  }
}

// dataLoader
async function loadAllUnits(onProgress = () => {}) {
  const cached = loadFromCache();
  if (cached && Array.isArray(cached) && cached.length > 0) {
    onProgress(100, '캐시에서 로드 완료');
    return cached;
  }
  onProgress(5, 'API 연결 중...');
  try {
    const raw = await fetchAllGundams((loaded, total) => {
      const pct = total > 0 ? Math.min(95, Math.round((loaded / total) * 90) + 5) : 50;
      onProgress(pct, `기체 데이터 로딩 중... (${loaded}/${total})`);
    });
    onProgress(96, '데이터 정규화 중...');
    const units = normalizeAll(raw);
    onProgress(99, '저장 중...');
    saveToCache(units);
    onProgress(100, `${units.length}개 기체 로드 완료!`);
    return units;
  } catch (err) {
    console.error('[DataLoader] API 로드 실패, fallback 사용:', err);
    onProgress(100, '연결 실패 — 기본 데이터 사용');
    return FALLBACK_UNITS;
  }
}

// main
function updateLoadingUI(pct, status) {
  const bar    = document.getElementById('loading-bar');
  const statEl = document.getElementById('loading-status');
  if (bar)    bar.style.width = `${pct}%`;
  if (statEl) statEl.textContent = status;
}

function renderPage(page) {
  const content = document.getElementById('page-content');
  if (!content) return;
  requestAnimationFrame(() => {
    content.style.opacity = '0';
    content.style.transform = 'translateY(10px)';
    content.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
    setTimeout(() => {
      if (page === 'home') {
        renderHomePage(content);
      } else if (page === 'list') {
        renderMechListPage(content);
      }
      content.style.opacity = '1';
      content.style.transform = 'translateY(0)';
    }, 150);
  });
}

async function init() {
  updateLoadingUI(5, 'API 연결 중...');
  const loadingScreen = document.getElementById('loading-screen');
  const mainApp = document.getElementById('main-app');
  try {
    const units = await loadAllUnits((pct, status) => {
      updateLoadingUI(pct, status);
    });

    if (loadingScreen) {
      loadingScreen.style.animation = 'fadeIn 0.4s ease reverse';
      setTimeout(() => {
        loadingScreen.style.display = 'none';
        if (mainApp) mainApp.style.display = '';
      }, 350);
    }


    // 4. 헤더 렌더
    renderHeader();

    // 5. 모달 초기화
    initModal();

    // 6. 스토어에 데이터 설정
    store.setState({ isLoading: false });
    store.setAllUnits(units);

    // 7. URL 상태 기반 초기 페이지 결정
    const urlParams = new URLSearchParams(window.location.search);
    const hasFilters = urlParams.has('q') || urlParams.has('series') || urlParams.has('type');
    const initialPage = hasFilters ? 'list' : store.state.currentPage;
    store.setState({ currentPage: initialPage });

    // 8. 초기 페이지 렌더
    renderPage(initialPage);

    // 9. 페이지 변경 구독
    let prevPage = initialPage;
    store.subscribe(state => {
      if (state.currentPage !== prevPage) {
        prevPage = state.currentPage;
        renderPage(state.currentPage);
      }
    });

    // 10. 로드 완료 토스트 (API 연결 성공 시)
    if (units.length > 20) {
      showToast(`${units.length.toLocaleString()}개 기체 데이터 로드 완료`, 'success');
    }

  } catch (err) {
    console.error('[App] 초기화 실패:', err);
    updateLoadingUI(100, '로드 실패. 기본 데이터를 사용합니다...');
    showToast('API 연결 실패. 기본 데이터를 사용합니다.', 'error');

    // 최소한의 앱 구동
    setTimeout(() => {
      const loadingScreen = document.getElementById('loading-screen');
      const mainApp = document.getElementById('main-app');
      if (loadingScreen) loadingScreen.style.display = 'none';
      if (mainApp) mainApp.style.display = '';
      renderHeader();
      initModal();
    }, 1500);
  }
}

// ─── DOM 준비 후 실행 ───
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

  </script>

<script id="gundam-patch-v3">
// ═══════════════════════════════════════════════════════
// GUNDAM DB PATCH v3 — 4 Issue Fix
// 1. 텍스트 깨짐 제거 (유니코드 쓰레기 문자)
// 2. 무장 정보 추출 개선
// 3. 기체 분류 정확도 개선 (건담/MS/MA)
// 4. 랜덤 기체 뽑기 강화
// ═══════════════════════════════════════════════════════

// ─── 1. 텍스트 정리 함수 ───────────────────────────────
function cleanGarbageChars(str) {
  if (!str) return '';
  return str
    // "c꺍?" 같이 ASCII + 깨진 한글 + ? 패턴 제거
    .replace(/[a-zA-Z]{1,3}[가-힣]{1,4}\?/g, '')
    // "? c꺍?" 같은 ? 로 시작하는 깨진 패턴
    .replace(/\?\s*[a-zA-Z]{0,3}[가-힣]{1,4}\??/g, '')
    // 한글 자음/모음 단독 (의미 없는 조각)
    .replace(/[\u3130-\u318F]+/g, '')
    // 깨진 유니코드 대체문자
    .replace(/[\uFFFD\uFFFE\uFFFF]/g, '')
    // HTML entity 잔재
    .replace(/&#\d+;/g, '')
    .replace(/&[a-z]+;/g, ' ')
    // 인용구로 시작하는 설명 제거 (인용문 + 화자명 "text" — Name.)
    .replace(/^[\u201c\u201d\u0022\u00ab\u00bb\u2018\u2019].{1,300}?[\u201c\u201d\u0022\u00bb\u2019]\s*(?:\u2014|\u2013|-)\s*.{1,100}?[.\n]/s, '')
    // Notes: Citations required 위키 잔재
    .replace(/Notes?:\s*Citations? required\.?\s*/gi, '')
    .replace(/"[^"]{1,60}"\s*is not in the list[^.]*\./g, '')
    // 연속된 물음표
    .replace(/\?{2,}/g, '')
    // 앞뒤 공백 정리
    .replace(/\s{2,}/g, ' ')
    .trim();
}


// ─── 2. 개선된 타입 판별 ───────────────────────────────
// 모빌아머 판별: 이름 패턴 + 설명 텍스트 기반
const MA_NAME_PATTERNS = [
  /\b(MA|MAN|MAM|YAMS|NZ|NMP|PMX|AMA|AMS)-[\dA-Z]/i,
  /\b(Big Zam|Bigro|Elmeth|Braw Bro|Apsalus|Neue Ziel|Alpha Azieru|Zeong)\b/i,
  /\b(Psycho Gundam|Sazabi(?:\s+MA)?|Nightingale)\b.*mobile armor/i,
  /\b(Monocle|Dolos|Gruntner|Gaw|Zanzibar|Great Degwin)\b/i,
  /\b(Dendrobium|Orchis|GP-03)\b/i,
];
const MA_DESC_KEYWORDS = [
  /\bis a mobile armor\b/i,
  /\btransformable mobile armor\b/i,
  /\bmobile armor that\b/i,
  /\bthis mobile armor\b/i,
];
// 건담이지만 실제 MA인 것들
const MA_FORCE_LIST = new Set([
  'MRX-009 Psycho Gundam', 'MRX-010 Psycho Gundam Mk-II',
  'MRX-011 Mass Production Type Psycho Gundam', 'MRX-012 Psycho Gundam Mk-III',
  'MRX-013-3 Psycho Gundam Mk-IV G-Doors',
  'NZ-666 Kshatriya', 'NZ-999 Neo Zeong', 'NZ-999 II Neo Zeong II',
  'MA-08 Big Zam', 'MSN-02 Zeong', 'MAN-08 Elmeth', 'MAX-03 Adzam',
  'MA-05 Bigro', 'MA-04X Zeong', 'MA-08 Big Zam',
  'Alpha Azieru', 'Neue Ziel', 'Apsalus I', 'Apsalus II', 'Apsalus III',
  'Braw Bro', 'Grublo', 'Bigro', 'Elmeth',
  'RX-123 Gundam TR-S [El-Ahrairah]',
  'RX-124 Gundam TR-6 [Inle]', 'RX-124 Gundam TR-6 [Psyco Inle]',
  'JDG-00X Devil Gundam',
  'Grand Gundam', 'Grand Master Gundam',
]);
// 이름에 Gundam 없지만 건담으로 분류할 것
const GUNDAM_FORCE_LIST = new Set([
  'MSN-00100 Hyaku Shiki', 'Hyaku Shiki',
  'OZ-00MS Tallgeese', 'OZ-00MS2 Tallgeese II', 'OZ-00MS2B Tallgeese III',
  'CONCEPT-X 6-1-2 Turn X', 'Turn X',
  'WD-M01 Turn A Gundam', 'Turn A Gundam',
  'MSN-04 Sazabi',  // 이건 MS로 분류
]);
// 이름에 Gundam 포함이지만 MS로 분류할 것 (non-Gundam-type Gundams)
const GUNDAM_NAME_BUT_MS = new Set([
  'MSN-04 Sazabi',
  'G-Saviour', 'G2-Saviour', 'G3-Saviour', 'I-SAVIOUR Illusion',
]);

function detectTypeV3(nameEn, descEn) {
  // FORCE LISTS 먼저 체크
  for (const key of MA_FORCE_LIST) {
    if (nameEn && nameEn.includes(key)) return 'Mobile Armor';
  }

  // MA 이름 패턴 체크
  for (const pat of MA_NAME_PATTERNS) {
    if (nameEn && pat.test(nameEn)) return 'Mobile Armor';
  }
  // MA 설명 체크
  for (const pat of MA_DESC_KEYWORDS) {
    if (descEn && pat.test(descEn)) return 'Mobile Armor';
  }

  // 건담 체크
  if (nameEn && /\bgundam\b/i.test(nameEn)) {
    if (GUNDAM_NAME_BUT_MS.has(nameEn)) return 'Mobile Suit';
    return 'Gundam';
  }
  // 강제 건담 목록
  for (const key of GUNDAM_FORCE_LIST) {
    if (nameEn && nameEn.includes(key)) return 'Gundam';
  }
  // Hyaku Shiki, Tallgeese 등 - 설명에서 gundam 언급 체크
  if (descEn && /\bgundam(?:-type)?\b/i.test(descEn) && !(/mobile armor/i.test(descEn))) {
    if (/Hyaku Shiki|Tallgeese|Turn [AX]/i.test(nameEn || '')) return 'Gundam';
  }

  return 'Mobile Suit';
}

function extractArmaments(text) {
  if (!text) return [];
  const found = {};
  const order = [];
  for (const pat of ARM_PATTERNS) {
    const matches = text.match(pat);
    if (!matches) continue;
    for (const raw of matches) {
      const key = raw.toLowerCase().trim();
      const ko = ARM_MAP[key] || (() => {
        for (const [k, v] of Object.entries(ARM_MAP)) {
          if (key.includes(k)) return v;
        }
        return null;
      })();
      if (ko && !found[ko]) {
        found[ko] = true;
        order.push(ko);
      }
    }
  }
  return order;
}

function getKnownArmaments(nameEn) {
  if (!nameEn) return null;
  if (KNOWN_ARMAMENTS[nameEn]) return KNOWN_ARMAMENTS[nameEn];
  for (const [key, arms] of Object.entries(KNOWN_ARMAMENTS)) {
    if (nameEn.includes(key) || key.includes(nameEn)) return arms;
  }
  return null;
}


function buildKoDesc(nameKo, descEn, typeKo, seriesKo) {
  const base = `${nameKo}는 ${seriesKo}에 등장하는 ${typeKo}입니다.`;
  if (!descEn || descEn.length < 15) return base;

  // 깨진 텍스트 정리
  let cleaned = cleanGarbageChars(descEn);
  // 첫 번째 의미 있는 문장들 추출 (2~3문장)
  const sents = cleaned.match(/[^.!?]+[.!?]+/g) || [];
  let summary = sents.slice(0, 3).join(' ').trim();
  if (!summary || summary.length < 20) summary = cleaned.slice(0, 300);

  // 영어→간단 한국어 치환
  const repl = (s) => s
    .replace(/is the titular mobile suit of (?:the (?:anime|TV anime|OVA|manga) )?(.+?)[\.,]/gi,
      (_, t) => `는 ${t.trim()}의 주인공 ${typeKo}입니다.`)
    .replace(/is a prototype mobile suit/gi, '는 시제품 모빌슈트입니다.')
    .replace(/is a mass production/gi, '는 양산형')
    .replace(/is a mobile armor/gi, '는 모빌아머입니다.')
    .replace(/is a transformable mobile (suit|armor)/gi, '는 변형 가능한 모빌슈트입니다.')
    .replace(/is a mobile suit/gi, '는 모빌슈트입니다.')
    .replace(/is a gundam/gi, '는 건담입니다.')
    .replace(/is an upgraded version of/gi, '의 개량형입니다.')
    .replace(/is a variant of/gi, '의 파생형입니다.')
    .replace(/was primarily piloted by ([^.,]+)/gi, '의 주 파일럿은 $1입니다.')
    .replace(/piloted by ([^.,]+)/gi, '(파일럿: $1)')
    .replace(/Earth Federation(?:\s+Forces)?/gi, '지구연방군')
    .replace(/Principality of Zeon/gi, '지온공국')
    .replace(/Neo Zeon/gi, '네오 지온')
    .replace(/Celestial Being/gi, '솔레스탈 비잉')
    .replace(/Tekkadan/gi, '테카단')
    .replace(/AEUG/gi, 'AEUG')
    .replace(/ZAFT/gi, 'ZAFT');

  const translated = repl(summary);
  // 영어가 5글자 이상 연속으로 남아있으면 base + 영어 보조설명
  if (/[a-zA-Z]{5,}/.test(translated)) {
    return `${base} ${summary.slice(0, 200)}`;
  }
  return `${nameKo}${translated}`;
}

// ─── 패치 실행 함수 ───────────────────────────────────
function applyPatchV3() {
  const store = window.__store__;
  if (!store || !store.state || !store.state.allUnits || store.state.allUnits.length === 0) {
    setTimeout(applyPatchV3, 400);
    return;
  }

  const rawData = window.__GDATA__ || [];
  const units = store.state.allUnits;
  let gCount = 0, msCount = 0, maCount = 0;

  for (let i = 0; i < units.length; i++) {
    const u = units[i];
    const rawItem = rawData[i] || {};

    // 원본 영어 설명 가져오기 (깨진 HTML 제거)
    let rawDesc = rawItem.header || rawItem.details || u.description_en || '';
    // HTML entity & 태그 제거
    rawDesc = rawDesc
      .replace(/&#\d+;/g, ' ')
      .replace(/&amp;/g, '&')
      .replace(/&lt;/g, '<')
      .replace(/&gt;/g, '>')
      .replace(/&quot;/g, '"')
      .replace(/&[a-z]+;/g, '')
      .replace(/<[^>]+>/g, '')
      .replace(/\s+/g, ' ')
      .trim();

    // 깨진 문자 정리된 영어 설명 저장
    u.description_en = cleanGarbageChars(rawDesc);

    // 타입 재분류
    const newType = detectTypeV3(u.name_en, u.description_en);
    u.type = newType;
    u.type_ko = newType === 'Gundam' ? '건담' : newType === 'Mobile Armor' ? '모빌아머' : '모빌슈트';
    if (newType === 'Gundam') gCount++;
    else if (newType === 'Mobile Armor') maCount++;
    else msCount++;

    // 무장 재추출: 설명 텍스트 → 없으면 사전 fallback
    const newArms = extractArmaments(u.description_en);
    u.armaments = newArms.length > 0 ? newArms : (getKnownArmaments(u.name_en) || u.armaments || []);


    // 한국어 설명 재생성
    u.description_ko = buildKoDesc(u.name_ko, u.description_en, u.type_ko, u.series_ko);
  }

  // 타입 카운트 갱신
  store.state.typeCounts = { Gundam: gCount, 'Mobile Suit': msCount, 'Mobile Armor': maCount };
  if (store._applyFilters) store._applyFilters();
  store.setState({ typeCounts: store.state.typeCounts });

  // 히어로 스탯 업데이트
  const statEls = document.querySelectorAll('.hero-stat-value');
  if (statEls.length >= 4) {
    statEls[0].textContent = units.length.toLocaleString();
    statEls[1].textContent = gCount.toLocaleString();
    statEls[2].textContent = msCount.toLocaleString();
    statEls[3].textContent = maCount.toLocaleString();
  }

  console.log(`[Patch v3] ✅ Done — Gundam:${gCount} MS:${msCount} MA:${maCount} Total:${units.length}`);
}

// ─── 랜덤 기체 뽑기 ───────────────────────────────────
function openRandomUnit() {
  const store = window.__store__;
  const units = store && store.state && store.state.allUnits;
  if (!units || units.length === 0) {
    showToast('데이터 로딩 중입니다. 잠시 후 다시 시도하세요.', 'error');
    return;
  }
  // 필터 타입이 있으면 해당 타입 내에서 랜덤
  const types = (store.state.types && store.state.types.length > 0) ? store.state.types : null;
  let pool = types ? units.filter(u => types.includes(u.type)) : units;
  if (pool.length === 0) pool = units;
  const random = pool[Math.floor(Math.random() * pool.length)];

  // 랜덤 선택 토스트
  showToast(`🎲 랜덤: ${random.name_ko}`, 'success');
  store.selectUnit(random);
}

// 랜덤 버튼 클릭 이벤트 (이벤트 위임)
document.addEventListener('click', function(e) {
  const btn = e.target.closest('#hero-random-btn, #random-btn-header');
  if (!btn) return;
  e.preventDefault();
  openRandomUnit();
}, true);

// 키보드 단축키: R 키 → 랜덤
document.addEventListener('keydown', function(e) {
  if (e.key === 'r' || e.key === 'R') {
    // 입력 필드 포커스 중이면 무시
    if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
    openRandomUnit();
  }
});

// ─── 시작 ─────────────────────────────────────────────
setTimeout(applyPatchV3, 600);
console.log('[Patch v3] Loaded — R키를 눌러 랜덤 기체를 뽑으세요');
</script>
</body>
</html>
